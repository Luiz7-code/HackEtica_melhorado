<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestão Saudável</title>

    <link rel="icon" href="img/favicon.png">

    <link rel="stylesheet" href="../css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-page fade">

    <div class="login-container">

        <!-- =============================
             LADO ESQUERDO
        ============================== -->

        <section class="left-side">

            <div class="logo-area">

                <img src="img/logo.png" alt="Logo">

                <h1>

                    Gestão Saudável

                </h1>

                <p>

                    Promovendo ambientes de trabalho mais saudáveis.

                </p>

            </div>
            <div class="hero-card">

                <div class="hero-top">

                    <div class="status-card">

                        <i class="fa-solid fa-chart-line"></i>

                        <div>

                            <h3>ICPO</h3>

                            <span>84</span>

                        </div>

                    </div>

                    <div class="status-card">

                        <i class="fa-solid fa-users"></i>

                        <div>

                            <h3>Equipe</h3>

                            <span>126</span>

                        </div>

                    </div>

                </div>

                <div class="hero-image">

                    <img src="img/login-ilustracao.png" alt="Ilustração">

                </div>

                <div class="hero-info">

                    <div class="info-item">

                        <i class="fa-solid fa-circle-check"></i>

                        <span>Monitoramento em tempo real</span>

                    </div>

                    <div class="info-item">

                        <i class="fa-solid fa-heart-pulse"></i>

                        <span>Indicadores psicossociais inteligentes</span>

                    </div>

                    <div class="info-item">

                        <i class="fa-solid fa-chart-pie"></i>

                        <span>Dashboard para gestores</span>

                    </div>

                </div>

            </div>

        </section>

        <!-- =============================
             LADO DIREITO
        ============================== -->

        <section class="right-side">

            <div class="login-card">
                <h2>

                    Bem-vindo!
                
                </h2>
                
                <p class="login-subtitle">
                
                    Entre para acessar o sistema.
                
                </p>
                
                <form id="formLogin">
                
                    <div class="input-group">
                
                        <label for="empresa">
                
                            Empresa
                
                        </label>
                
                        <div class="input-box">
                
                            <i class="fa-solid fa-building"></i>
                
                            <input
                                type="text"
                                id="empresa"
                                placeholder="Digite o nome da empresa"
                                required>
                
                        </div>
                
                    </div>
                
                    <div class="input-group">
                
                        <label for="usuario">
                
                            Usuário
                
                        </label>
                
                        <div class="input-box">
                
                            <i class="fa-solid fa-user"></i>
                
                            <input
                                type="text"
                                id="usuario"
                                placeholder="Digite seu usuário"
                                required>
                
                        </div>
                
                    </div>
                
                    <div class="input-group">
                
                        <label for="senha">
                
                            Senha
                
                        </label>
                
                        <div class="input-box">
                
                            <i class="fa-solid fa-lock"></i>
                
                            <input
                                type="password"
                                id="senha"
                                placeholder="Digite sua senha"
                                required>
                
                        </div>
                
                    </div>
                
                    <button
                        class="btn"
                        type="submit">
                
                        Entrar
                
                    </button>
                
                </form>
                
                <p class="register-text">
                
                    Não possui uma empresa cadastrada?
                
                    <a href="cadastro.html">
                
                        Criar empresa
                
                    </a>
                
                </p>
            </div>

        </section>

    </div>

</div>

<script src="js/banco.js"></script>

<script src="js/login.js"></script>

</body>

</html>
